<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>贪吃蛇</h1>
            <div class="score-board">
                <div class="score-item">
                    <span class="label">得分</span>
                    <span id="score" class="value">0</span>
                </div>
                <div class="score-item">
                    <span class="label">最高分</span>
                    <span id="high-score" class="value">0</span>
                </div>
                <div class="score-item">
                    <span class="label">速度</span>
                    <span id="speed" class="value">1</span>
                </div>
            </div>
        </header>

        <div class="canvas-wrapper">
            <canvas id="game-canvas" width="400" height="400"></canvas>

            <div id="start-screen" class="overlay">
                <div class="overlay-content">
                    <h2>贪吃蛇游戏</h2>
                    <p>使用键盘方向键控制蛇的移动</p>
                    <p>吃到食物得分，撞到墙壁或自己则游戏结束</p>
                    <p>每吃5个食物速度会加快</p>
                    <button id="start-btn" class="btn btn-primary">开始游戏</button>
                </div>
            </div>

            <div id="game-over-screen" class="overlay hidden">
                <div class="overlay-content">
                    <h2>游戏结束</h2>
                    <p>最终得分: <span id="final-score">0</span></p>
                    <p id="new-record" class="hidden">🎉 新纪录！</p>
                    <button id="restart-btn" class="btn btn-primary">再来一局</button>
                </div>
            </div>
        </div>

        <footer class="game-footer">
            <p>按 <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 控制方向 | 按 <kbd>空格</kbd> 暂停/继续</p>
        </footer>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
