server:
  port: 8080
  mode: release
  read_timeout: 60
  write_timeout: 60

database:
  host: localhost
  port: 3306
  user: root
  password: your_password
  dbname: music_platform
  sslmode: disable
  timezone: Asia/Shanghai

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0
  pool_size: 100

jwt:
  secret: your-jwt-secret-key-please-change-it
  expire_hour: 72
  issuer: music-platform

upload:
  max_size: 52428800
  audio_path: ./uploads/audio
  image_path: ./uploads/images
  allowed_ext:
    - .mp3
    - .wav
    - .flac
    - .aac
    - .ogg
    - .m4a

log:
  level: info
  filename: ./logs/app.log
  max_size: 100
  max_age: 30
