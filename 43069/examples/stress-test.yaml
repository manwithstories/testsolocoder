name: "阶梯式压力测试"
description: "阶梯式增加并发用户数进行压力测试"
base_url: "https://jsonplaceholder.typicode.com"
timeout: 15
retries: 2

headers:
  Content-Type: "application/json"
  Accept: "application/json"

concurrency:
  mode: "steps"
  steps:
    - workers: 5
      duration: 10
    - workers: 10
      duration: 10
    - workers: 20
      duration: 10
    - workers: 30
      duration: 10

scenarios:
  - name: "混合场景"
    weight: 1
    requests:
      - name: "获取用户列表"
        method: "GET"
        path: "/users"
        assertions:
          - type: "status_code"
            operator: "eq"
            value: 200
          - type: "response_time"
            operator: "lte"
            value: 5000
        think_time: 500

      - name: "获取帖子"
        method: "GET"
        path: "/posts/1"
        assertions:
          - type: "status_code"
            operator: "eq"
            value: 200
          - type: "response_time"
            operator: "lte"
            value: 3000
        think_time: 300

      - name: "获取评论"
        method: "GET"
        path: "/comments?postId=1"
        assertions:
          - type: "status_code"
            operator: "eq"
            value: 200
        think_time: 200
