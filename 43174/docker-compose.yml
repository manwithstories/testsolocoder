version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: campus_trade_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: campus_trade
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: campus_trade_backend
    environment:
      - SERVER_PORT=8080
      - SERVER_MODE=release
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/campus_trade?sslmode=disable
      - JWT_SECRET=your-production-secret-key-change-this
      - JWT_EXPIRE_HOURS=24
      - UPLOAD_PATH=./uploads
      - MAX_UPLOAD_SIZE=10485760
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads
      - ./exports:/app/exports
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: campus_trade_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
