server:
  port: 8080
  mode: release
  read_timeout: 30
  write_timeout: 30
  max_upload_size: 536870912

database:
  host: localhost
  port: 5432
  user: postgres
  password: postgres
  dbname: print3d_db
  sslmode: disable
  timezone: Asia/Shanghai

jwt:
  secret_key: print3d-platform-secret-key-2024
  access_token_expire_hours: 24
  refresh_token_expire_hours: 168

storage:
  upload_path: uploads
  max_file_size: 536870912
  allowed_extensions:
    - .stl
    - .obj
    - .jpg
    - .jpeg
    - .png

pricing:
  platform_fee_rate: 0.10
  designer_fee_rate: 0.40
  printer_fee_rate: 0.50
  volume_price_multiplier: 0.05
  time_price_multiplier: 0.02

logging:
  level: info
  file: logs/app.log
  max_size: 100
  max_backups: 10
  max_age: 30
