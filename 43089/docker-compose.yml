version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: travel-planner-db
    environment:
      POSTGRES_USER: ${DB_USER:-travel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-travel123}
      POSTGRES_DB: ${DB_NAME:-travel_planner}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-travel}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
