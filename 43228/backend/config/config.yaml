server:
  port: ":8080"
  mode: "debug"

database:
  host: "localhost"
  port: "3306"
  user: "root"
  password: "123456"
  name: "tea_platform"
  charset: "utf8mb4"
  parse_time: true
  max_idle_conns: 10
  max_open_conns: 100

jwt:
  secret: "your-secret-key-here-change-in-production"
  expire_hours: 72

log:
  level: "info"
  format: "json"
  output: "stdout"

upload:
  max_size: 10
  allowed_types: ["jpg", "jpeg", "png", "gif", "webp"]
  tea_images_path: "./uploads/tea_images"
  packaging_images_path: "./uploads/packaging_images"
  evaluation_images_path: "./uploads/evaluation_images"

schedule:
  inventory_check_interval: "0 */6 * * *"
  shelf_life_check_interval: "0 0 * * *"
