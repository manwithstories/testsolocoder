server:
  host: "0.0.0.0"
  port: 8080
  mode: "debug"

database:
  host: "127.0.0.1"
  port: 3306
  user: "root"
  password: "password"
  dbname: "notification_center"
  charset: "utf8mb4"
  parse_time: true
  max_open_conns: 100
  max_idle_conns: 10
  conn_max_lifetime: 3600

redis:
  host: "127.0.0.1"
  port: 6379
  password: ""
  db: 0
  pool_size: 100

log:
  level: "debug"
  format: "json"
  output: "stdout"
  file_path: "./logs/app.log"
  max_size: 100
  max_backups: 10
  max_age: 30
  compress: true

rate_limit:
  global:
    enabled: true
    requests_per_second: 1000
    burst: 2000
  default_channel:
    enabled: true
    requests_per_second: 100
    burst: 200

queue:
  worker_count: 10
  max_queue_size: 10000
  poll_interval: 100

retry:
  max_attempts: 5
  initial_backoff: 1000
  max_backoff: 60000
  backoff_multiplier: 2.0
  retryable_errors:
    - "timeout"
    - "connection refused"
    - "rate limit"
    - "temporary error"
    - "500"
    - "502"
    - "503"
    - "504"

webhook:
  timeout: 5000
  max_retries: 3
  backoff: 1000
