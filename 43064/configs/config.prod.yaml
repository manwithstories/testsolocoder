server:
  host: "0.0.0.0"
  port: 8080
  mode: "release"

database:
  host: "${DB_HOST}"
  port: "${DB_PORT}"
  user: "${DB_USER}"
  password: "${DB_PASSWORD}"
  dbname: "${DB_NAME}"
  charset: "utf8mb4"
  parse_time: true
  max_open_conns: 200
  max_idle_conns: 50
  conn_max_lifetime: 7200

redis:
  host: "${REDIS_HOST}"
  port: "${REDIS_PORT}"
  password: "${REDIS_PASSWORD}"
  db: 0
  pool_size: 200

log:
  level: "info"
  format: "json"
  output: "file"
  file_path: "/var/log/notification-center/app.log"
  max_size: 500
  max_backups: 30
  max_age: 90
  compress: true

rate_limit:
  global:
    enabled: true
    requests_per_second: 5000
    burst: 10000
  default_channel:
    enabled: true
    requests_per_second: 500
    burst: 1000

queue:
  worker_count: 50
  max_queue_size: 100000
  poll_interval: 50

retry:
  max_attempts: 5
  initial_backoff: 1000
  max_backoff: 60000
  backoff_multiplier: 2.0
  retryable_errors:
    - "timeout"
    - "connection refused"
    - "rate limit"
    - "temporary error"
    - "500"
    - "502"
    - "503"
    - "504"

webhook:
  timeout: 10000
  max_retries: 5
  backoff: 2000
