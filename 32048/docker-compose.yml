version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: secondhand-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: secondhand
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: secondhand-api
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=secondhand
      - SERVER_PORT=8080
      - JWT_SECRET=your-super-secret-key-change-in-production
      - JWT_EXPIRE_HOURS=24
      - MIN_CREDIT_SCORE=50
      - MAX_FAVORITES=50
      - AUTO_CLOSE_HOURS=48
    volumes:
      - ./uploads:/root/uploads

volumes:
  postgres_data:
