server:
  port: ":8080"
  mode: "release"

database:
  mysql:
    host: "localhost"
    port: 3306
    user: "root"
    password: "123456"
    dbname: "secondhand_platform"
    charset: "utf8mb4"
    max_open_conns: 100
    max_idle_conns: 10
    conn_max_lifetime: 3600
  redis:
    host: "localhost"
    port: 6379
    password: ""
    db: 0
    pool_size: 100

jwt:
  secret: "secondhand-platform-secret-key-2024"
  access_token_expire: 24
  refresh_token_expire: 168

upload:
  max_file_size: 10485760
  allowed_types:
    - "image/jpeg"
    - "image/png"
    - "image/gif"
    - "image/webp"
  upload_path: "./uploads/"

log:
  level: "info"
  format: "json"
  output: "stdout"

commission:
  rate: 0.05
  min_amount: 1.00
